database:
  # Canonical shared DB — same pool as harness-engineering and adx-cli. GOO-19.
  path: ~/.kaos/kaos.db
  wal_mode: true
  compression: zstd

models:
  claude-sonnet:
    provider: claude_code
    model_id: claude-opus-4-7
    max_context: 200000
    timeout: 1800
    use_for: [trivial, moderate, complex, critical, code_completion, code_generation, planning]

router:
  type: tier
  fallback_model: claude-sonnet
  context_compression: true
  max_retries: 1

ccr:
  max_iterations: 100
  checkpoint_interval: 10
  timeout_seconds: 3600
  max_parallel_agents: 8

logging:
  level: INFO
  file: ./bene.log

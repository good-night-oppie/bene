database:
  # Canonical shared DB — same pool as harness-engineering and adx-cli. GOO-19.
  # 2026-06-23: renamed kaos.db -> bene.db (kaos MCP retired, consolidated on BENE).
  # ~/.kaos/kaos.db remains as a back-compat symlink -> bene.db for legacy refs.
  path: ~/.kaos/bene.db
  wal_mode: true
  compression: zstd

models:
  claude-sonnet:
    provider: claude_code
    model_id: claude-opus-4-7
    max_context: 200000
    timeout: 1800
    use_for: [trivial, moderate, code_completion, code_generation]

  # HARD-PROBLEM TIER — Eddie 2026-07-03: switched from the Gemini Ultra sub
  # (cli-proxy-gemini :8319) to Claude Code Fable 5 — same claude_code subprocess
  # provider as claude-sonnet above, zero paid API, uses the Claude Code subscription.
  claude-fable-deepthink:
    provider: claude_code
    model_id: claude-fable-5
    max_context: 300000
    timeout: 1800
    use_for: [complex, critical, planning]

router:
  type: tier
  fallback_model: claude-sonnet
  context_compression: true
  max_retries: 2

ccr:
  max_iterations: 100
  checkpoint_interval: 10
  timeout_seconds: 3600
  max_parallel_agents: 8

logging:
  level: INFO
  file: ./bene.log

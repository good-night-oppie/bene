entries:
  - file: site/index.html
    match_contains: Fear is the
    rule_id: BENE-LINT-010
    justification: 'Verbatim Frank Herbert Litany Against Fear inside a styled blockquote.

      The project''s name (Bene Gesserit) and CLAUDE.md preamble cite this

      passage as the namesake; rewriting it would defeat the citation.

      '
    expires: 2030-01-01
  - file: site/zh/index.html
    match_contains: Fear is the
    rule_id: BENE-LINT-010
    justification: 'Verbatim Frank Herbert Litany Against Fear (zh translation alongside),

      same blockquote citation as site/index.html.

      '
    expires: 2030-01-01
  - file: README.md
    match_contains: Fear is the
    rule_id: BENE-LINT-010
    justification: "README opens with the Frank Herbert Litany blockquote \u2014 same\
      \ project\nnamesake citation as the landing.\n"
    expires: 2030-01-01
  - file: site/index.html
    line: 1
    rule_id: BENE-LINT-005
    justification: "Single-file SPA \u2014 Hero Terminal at line 902 is structurally\
      \ >8000 chars\nfrom offset 0 (React bundled in <script>). Rule's MDX assumption\
      \ does\nnot apply to bundled JSX-in-HTML. Drop this entry if site/index.html\n\
      migrates to MDX.\n"
    expires: 2030-01-01
  - file: site/zh/index.html
    line: 1
    rule_id: BENE-LINT-005
    justification: 'Same SPA structural mismatch as site/index.html:1. Drop if zh
      landing

      migrates to MDX.

      '
    expires: 2030-01-01
  - file: README.md
    match_contains: Everything is an engram
    rule_id: BENE-LINT-010
    justification: "\"Everything is an engram\" is the central kernel-design premise\n\
      (docs/design/BENE2-DESIGN.md). The mantra IS the asset; the\nengram-substrate\
      \ thesis is what the rest of the README builds on.\nNot recidivism \u2014 this\
      \ is the design centerpoint, deliberately stated.\n"
    expires: 2030-01-01
  - file: README.md
    match_contains: are vendored in the research workspace
    rule_id: BENE-LINT-019
    justification: This explains code structure, acceptable warning.
    expires: '2030-01-01'
  - file: site/SKILL.md
    match_contains: computed, never declared
    rule_id: BENE-LINT-012
    justification: SKILL.md specifies kernel rules, acceptable to use technical terms.
    expires: '2030-01-01'
  - file: site/SKILL.md
    match_contains: substrate
    rule_id: BENE-LINT-004
    justification: SKILL.md uses precise technical terminology.
    expires: '2030-01-01'

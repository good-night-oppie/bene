const Terminal = ({ children, caption, copyText }) => {
  const [copied, setCopied] = React.useState(false);
  const onCopy = async () => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(copyText);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);

    } catch (e) { /* swallow */ }
  };
  return (
    <div className="flex flex-col gap-3">
      <div className="bg-[rgb(var(--term))] border border-bene-dim rounded-sm overflow-hidden">

            <button onClick={onCopy} className="font-mono text-xs text-bene-muted hover:text-bene-accent transition-colors"

// ─── Copy-llms.txt button ───────────────────────────────────────────
// Fetches /bene/llms.txt, copies to the clipboard, flashes a confirmation.
// Falls back to opening the file in a new tab if clipboard API is blocked.
const CopyLlmsTxtButton = ({ className = '', label = 'Copy llms.txt' } = {}) => {
  const [state, setState] = React.useState('idle');
  const onClick = async () => {
    try {
      const r = await fetch('../llms.txt', { cache: 'no-cache' });
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      const text = await r.text();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        setState('copied');
        setTimeout(() => setState('idle'), 2200);
      } else {
        window.open('../llms.txt', '_blank', 'noopener,noreferrer');
        setState('opened');
        setTimeout(() => setState('idle'), 2200);
      }
    } catch (e) {
      window.open('llms.txt', '_blank', 'noopener,noreferrer');
      setState('opened');
      setTimeout(() => setState('idle'), 2200);
    }
  };
  const flash =
    state === 'copied' ? '✓ 已复制 — 粘进你的 agent' :
    state === 'opened' ? '↗ 已在新标签打开' :
    label;
  return (
    <button onClick={onClick}
      title="复制 llms.txt 站点地图（指向 SKILL.md + 全部文档的 LLM 友好索引），粘到你 agent 的 context 里"
      className={`font-mono text-xs text-bene-text hover:bg-bene-text/10 transition-colors border border-bene-text rounded-sm px-3 py-2 whitespace-nowrap ${className}`}>
      {flash}
    </button>
  );
};

const TheGap = () => (
  <Section id="gap">

    <h2 className="font-display text-3xl md:text-4xl lg:text-5xl xl:text-6xl font-semibold mb-6 lg:mb-8">

          新 prompt 过了 offline eval，分数只说明它在题库里好看。线上会不会 regress，最后还得看 pipeline 里那个人，或者那段 deploy 脚本。BENE 把这一步写死在代码里：<code className="text-bene-text">promote()</code> 没拿到 sha256-locked probe 的 ACCEPT 就抛 <code className="text-bene-text">PromotionBlocked</code>，CI 看到 exception 直接停。

      <Card className="md:col-span-6 h-full">
        <h3 className="font-mono text-bene-accent mb-4">卡点 2：跨 agent 的记忆，得带 provenance「溯源」</h3>

          对话历史、单个 agent 的 memory block 现在都不稀奇。真正少见的是 engram：有类型、有 provenance「溯源」链路，还分 5 档 tier。三个月后换一个 agent grep 进来，仍然知道这段数据从哪来、凭什么信。BENE 每次 run 默认就把每轮交互写成这种 engram。

// ─── Beat badges (original Patagon-style geometric marks) ───────────
const Badge = ({ kind }) => {
  const c = 'currentColor';
  const stroke = { fill: 'none', stroke: c, strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const fill = { fill: c, stroke: 'none' };
  const wrap = (children) => (
    <svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true" className="text-bene-accent shrink-0">{children}</svg>
  );
  if (kind === 'other-memory') return wrap(<>
    <path {...stroke} d="M 22 32 A 10 10 0 0 1 42 32" />
    <path {...stroke} d="M 14 32 A 18 18 0 0 1 50 32" />
    <path {...stroke} d="M 6 32 A 26 26 0 0 1 58 32" />
    <circle {...fill} cx="32" cy="46" r="3" />
  </>);
  if (kind === 'missionaria') return wrap(<>
    <path {...fill} d="M 32 44 C 26 34, 26 28, 32 24 C 38 28, 38 34, 32 44 Z" />
    <path {...stroke} d="M 32 16 L 32 6" />
    <path {...stroke} d="M 24 20 L 14 12" />
    <path {...stroke} d="M 40 20 L 50 12" />
    <path {...stroke} d="M 18 30 L 8 26" />
    <path {...stroke} d="M 46 30 L 56 26" />
  </>);
  if (kind === 'breeding') return wrap(<>
    <g {...{...stroke, strokeWidth: 1.5}}>
      <path d="M 32 54 L 20 38 M 32 54 L 44 38" />
      <path d="M 20 38 L 14 22 M 20 38 L 26 22" />
      <path d="M 44 38 L 38 22 M 44 38 L 50 22" />
      <path d="M 14 22 L 11 8 M 14 22 L 17 8" />
      <path d="M 26 22 L 23 8 M 26 22 L 29 8" />
      <path d="M 38 22 L 35 8 M 38 22 L 41 8" />
      <path d="M 50 22 L 47 8 M 50 22 L 53 8" />
    </g>
    <circle {...fill} cx="32" cy="54" r="2.5" />
  </>);
  if (kind === 'litany') return wrap(<>
    <path {...stroke} d="M 8 32 L 28 32" />
    <path {...stroke} d="M 36 24 L 36 32 L 56 32" />
  </>);
  if (kind === 'gom-jabbar') return wrap(<>
    <path {...stroke} d="M 32 18 L 32 56" />
    <path {...stroke} d="M 16 40 L 48 40" />
    <circle {...fill} cx="32" cy="12" r="2.5" />
  </>);
  return null;
};

function App() {
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('bene-theme') || 'light'; } catch (e) { return 'light'; }
  });
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('bene-theme', theme); } catch (e) {}
  }, [theme]);
  return (
    <div className="min-h-screen w-full bg-bene-bg text-bene-text font-sans selection:bg-bene-accent/30 selection:text-bene-accent overflow-x-hidden">
      <Nav theme={theme} setTheme={setTheme} />

        <Contract />
        <Comparison />
        <Proof />
        <Recipes />
        <Architecture />
        <Limits />
        <Lore />

    </div>
  );
}

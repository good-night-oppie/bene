# yamllint disable rule:truthy
# Gate-1 Fast: required check for feature -> dev PRs.
#
# Contract (.factory/specs/bene-cicd-redesign-tiered.md):
#   - p95 wall-time < 5 min
#   - single rolled-up required name (`ci/fast`)
#   - honest-baseline (no silent base-red swallow)
#   - pass->fail detection via junit failures+errors
#   - per-PR coverage drop limit 0.1% (ratchet floor backstops)

name: reusable-fast-gate

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      cov-floor-file:
        type: string
        default: ".coverage-floor"
      cov-drop-limit:
        type: string
        default: "0.1"

permissions:
  contents: read

jobs:
  fast:
    name: ci/fast
    runs-on: eng-github-runners
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
          python-version: ${{ inputs.python-version }}
      - name: Install dev dependencies
        run: uv sync --dev --group temporal
      - name: ruff check
        run: uv run ruff check bene/ tests/
      - name: ruff format check
        run: uv run ruff format --check bene/ tests/
      - name: landing-copy-linter
        run: uv run python scripts/landing_copy_linter.py
      - name: landing-accuracy-gate
        # Executable gate: install commands resolve / have a disclosure, and doc
        # hard-numbers (tables, schema version) match the real db. accuracy_gate
        # prints VERDICT but doesn't sys.exit on REJECT, so enforce it here.
        run: |
          uv run python scripts/landing_copy_linter/accuracy_gate.py check | tee /tmp/gate.out
          grep -q 'VERDICT=ACCEPT' /tmp/gate.out || { echo '::error::landing accuracy gate REJECTED — see findings above'; exit 1; }
      - name: pin-check (.github/bene/pin.env present)
        run: |
          test -f .github/bene/pin.env || { echo "missing pin.env"; exit 1; }
          grep -q '^BENE_VERSION=' .github/bene/pin.env
      - name: tests-fast with coverage floor
        env:
          COV_FLOOR: ${{ inputs.cov-floor-file }}
        run: |
          floor="$(cat "${COV_FLOOR}")"
          uv run pytest -q \
            -m "not slow and not integration" \
            --cov=bene --cov-report=term-missing \
            "--cov-fail-under=${floor}"
      - name: secrets scan (placeholder)
        run: |
          # Marketplace gitleaks action requires org license; replace with
          # an org-approved scanner (e.g., trufflehog) in a follow-up.
          echo "secrets scan placeholder"

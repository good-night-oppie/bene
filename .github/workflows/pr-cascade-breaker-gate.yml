name: pr-cascade-breaker-gate

# Post-hoc gate per ~/.claude/skills/pr-cascade-breaker/SKILL.md §"Non-LLM gate (D5)".
# We cannot intercept chatgpt-codex-connector / cursor-agent / agy GitHub-App payloads
# before they land, so when a bot review comment is created we validate it against the
# reviewer_finding schema + grep-verify evidence_quote, and minimise the comment if it
# fails. Human comments are exempt; the gate's own warning is exempt; comments with a
# literal "[pr-cascade-breaker: skip <reason>]" marker are exempt.
#
# Default branch: main. Always exit 0 — this gate is informational+protective, not a
# merge blocker (per Eddie standing directive: "don't spend PRs making CI green").

on:
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write

jobs:
  cascade-gate:
    if: >
      contains('chatgpt-codex-connector[bot] chatgpt-codex-connector codex[bot] cursor-agent[bot] cursor-agent agy[bot]',
               github.event.comment.user.login)
      || contains('chatgpt-codex-connector[bot] chatgpt-codex-connector codex[bot] cursor-agent[bot] cursor-agent agy[bot]',
                  github.event.review.user.login)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          # Run the gate from the trusted base-branch code so a PR that edits the gate
          # script cannot weaken it for itself (same pattern as review-comment-signoff-gate).
          ref: ${{ github.event.pull_request.base.sha }}

      - uses: actions/checkout@v4
        with:
          # Evidence target tree: validate_body() greps evidence_quote against
          # files under --repo-root. PR-added lines are absent from the base
          # checkout, so we point evidence verification at PR HEAD content. The
          # gate SCRIPT still loads from base (trusted) — only the file under
          # inspection comes from head. A PR cannot weaken its own gate this way:
          # the only thing it can affect is what evidence_quote successfully
          # matches, and the gate's job is to PASS valid findings.
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: validate review comment against reviewer_finding schema
        if: github.event_name == 'pull_request_review_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set +e
          python3 -m pip install --quiet --disable-pip-version-check pyyaml >/dev/null
          # head:. — head first (PR-added lines), base second (deleted-side / LEFT
          # quotes for removed-code findings). validate_body accepts evidence found
          # in EITHER root.
          python3 scripts/pr_cascade_breaker_gate.py \
            --repo "$REPO" --pr "$PR_NUM" --comment-id "$COMMENT_ID" --repo-root 'head:.'
          exit 0
